name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-syntax:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-optional.txt

      - name: Check syntax
        run: python -m py_compile proxy_guard.py && echo "Syntax OK"

      - name: Check imports / CLI help
        run: python proxy_guard.py --help
