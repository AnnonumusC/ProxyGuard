name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build EXE (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-optional.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller proxy_guard.spec

      - name: Verify build
        run: |
          dir dist\
          echo "Build complete"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyGuard-Windows-EXE
          path: dist/ProxyGuard.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ProxyGuard Ultimate ${{ github.ref_name }}
          body: |
            ## ProxyGuard Ultimate ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows 10/11 (64-bit) | `ProxyGuard.exe` |

            ### Quick start
            ```
            ProxyGuard.exe --help
            ProxyGuard.exe --discover
            ProxyGuard.exe proxies.txt --mesh-hops 3
            ```

            > Windows Defender may flag the EXE — false positive common with PyInstaller.
            > Add an exclusion or run from source if preferred.

            See [README](README.md) for full documentation.
          files: dist/ProxyGuard.exe
